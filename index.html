<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAC Sculptfusion Inspector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #5c5fe3; --violet: #7c3aed;
      --grad: linear-gradient(135deg, #5c5fe3 0%, #7c3aed 100%);
      --red: #dc2626; --red-bg: #fef2f2; --orange: #d97706; --orange-bg: #fffbeb;
      --green: #16a34a; --green-bg: #f0fdf4; --blue: #1d4ed8; --blue-bg: #eff6ff;
      --grey: #6b7280; --grey-bg: #f3f4f6; --border: #e5e7eb;
      --text: #111827; --text-soft: #6b7280; --radius: 14px;
      --shadow: 0 8px 30px rgba(92,95,227,0.18), 0 2px 8px rgba(0,0,0,0.08);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--grad); min-height: 100vh; color: var(--text); }
    .page { padding: 24px 20px 60px; max-width: 1040px; margin: 0 auto; }

    .app-header { text-align: center; color: white; margin-bottom: 28px; padding-top: 8px; }
    .app-header h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; letter-spacing: 0.5px; }
    .app-header p  { font-size: 0.9rem; opacity: 0.8; margin-top: 6px; }

    .toolbar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 22px; flex-wrap: wrap; }
    .btn-ghost { padding: 9px 16px; border: 2px solid rgba(255,255,255,0.45); border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.15); color: white; font-family: inherit; transition: background 0.15s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.25); }
    .btn-ghost.active { background: white; color: var(--purple); border-color: white; }
    .btn-white { padding: 9px 16px; border: 2px solid white; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: var(--purple); font-family: inherit; transition: opacity 0.15s; display: inline-flex; align-items: center; gap: 5px; }
    .btn-white:hover { opacity: 0.88; }

    .card-grid { display: flex; flex-wrap: wrap; gap: 18px; }
    .sculpture-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; flex: 1 1 205px; max-width: 285px; min-width: 180px; cursor: pointer; position: relative; transition: transform 0.18s, box-shadow 0.18s; }
    .sculpture-card:hover { transform: translateY(-3px); box-shadow: 0 14px 38px rgba(92,95,227,0.24); }
    .sculpture-card.manage-mode { cursor: default; }
    .sculpture-card.manage-mode:hover { transform: none; box-shadow: var(--shadow); }
    .card-img { width: 100%; height: 155px; object-fit: cover; display: block; }
    .card-img-placeholder { width: 100%; height: 155px; background: linear-gradient(135deg,#e8e8f4,#d0d0ea); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; color: #aaa; cursor: pointer; }
    .card-img-placeholder .ph-icon { font-size: 28px; opacity: 0.4; }
    .card-img-placeholder p { font-size: 12px; font-weight: 600; }
    .card-img-placeholder input { display: none; }
    .card-body { padding: 10px 13px 13px; }
    .card-name   { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .card-artist { font-size: 12px; color: var(--purple); font-weight: 600; margin-bottom: 3px; font-style: italic; }
    .card-loc    { font-size: 11px; color: var(--text-soft); margin-bottom: 4px; line-height: 1.4; }
    .card-date   { font-size: 11px; color: var(--text-soft); margin-bottom: 6px; }
    .card-date strong { color: var(--purple); }
    .del-btn { position: absolute; top: 8px; right: 8px; background: rgba(220,38,38,0.88); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .add-card { background: white; border-radius: var(--radius); border: 3px dashed #c5c5e8; flex: 1 1 205px; max-width: 285px; min-width: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 240px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .add-card:hover { border-color: var(--purple); background: #f5f5ff; }
    .add-card .plus { font-size: 48px; color: #c5c5e8; line-height: 1; margin-bottom: 10px; }
    .add-card p { font-size: 14px; color: #aaa; font-weight: 600; }

    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }
    .badge-none    { background: var(--green-bg);  color: var(--green); }
    .badge-routine { background: var(--blue-bg);   color: var(--blue); }
    .badge-minor   { background: var(--orange-bg); color: var(--orange); }
    .badge-major   { background: var(--red-bg);    color: var(--red); }
    .badge-urgent  { background: var(--red);       color: white; }
    .badge-empty   { background: var(--grey-bg);   color: var(--grey); }

    .back-btn { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.18); color: white; border: 2px solid rgba(255,255,255,0.4); padding: 9px 16px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 18px; font-family: inherit; transition: background 0.15s; }
    .back-btn:hover { background: rgba(255,255,255,0.28); }

    .main-card { background: white; border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden; }

    /* Sculpture image banner on inspection page */
    #insp-img-wrapper { position: relative; }
    .insp-img-banner { width: 100%; height: 230px; object-fit: cover; display: block; }
    .insp-img-placeholder { width: 100%; height: 230px; background: linear-gradient(135deg,#e8e8f4,#d0d0ea); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
    .insp-img-placeholder .ph-icon { font-size: 40px; opacity: 0.35; }
    .insp-img-placeholder p { font-size: 13px; font-weight: 600; color: #aaa; }
    .insp-img-placeholder input { display: none; }
    .insp-img-change { position: absolute; bottom: 10px; right: 12px; }
    .insp-img-change label { background: rgba(0,0,0,0.55); color: white; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .insp-img-change input { display: none; }

    .section { padding: 20px 24px; border-bottom: 1px solid #f0f0f4; }
    .section:last-child { border-bottom: none; }
    .sec-title { font-size: 11px; font-weight: 700; color: var(--purple); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1.2px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    @media(max-width:600px){ .grid-2,.grid-3 { grid-template-columns: 1fr; } }

    label.field-label { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type=text], input[type=date], textarea {
      width: 100%; padding: 10px 13px; border: 2px solid var(--border);
      border-radius: 9px; font-size: 14px; font-family: inherit; color: var(--text);
      transition: border-color 0.15s; background: white;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--purple); }
    textarea { resize: vertical; min-height: 80px; }
    input[readonly] { background: #f9f9fc; }

    .check-item { background: #fafafa; border: 2px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .check-q    { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .rating-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
    .r-btn { flex: 1 1 auto; min-width: 60px; padding: 9px 6px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; background: white; color: #555; font-family: inherit; transition: all 0.15s; }
    .r-btn:hover { border-color: #aaa; }
    .r-btn.selected { background: var(--purple); border-color: var(--purple); color: white; }
    .r-btn.selected.urgent { background: var(--red); border-color: var(--red); }

    .maint-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .maint-btn { flex: 1 1 auto; min-width: 80px; padding: 10px 8px; border: 2px solid var(--border); border-radius: 9px; cursor: pointer; font-weight: 600; font-size: 12px; background: white; color: #555; font-family: inherit; transition: all 0.15s; }
    .maint-btn.selected { background: var(--purple); border-color: var(--purple); color: white; }

    .photo-upload-label { display: flex; align-items: center; justify-content: center; width: 100%; padding: 16px; border: 2px dashed var(--purple); border-radius: 12px; cursor: pointer; background: #f5f5ff; font-size: 14px; color: var(--purple); font-weight: 600; gap: 8px; transition: background 0.15s; }
    .photo-upload-label:hover { background: #ededff; }
    .photo-upload-label input { display: none; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(100px,1fr)); gap: 10px; margin-top: 14px; }
    .photo-item { position: relative; border-radius: 8px; overflow: hidden; }
    .photo-item img { width: 100%; height: 100px; object-fit: cover; display: block; }
    .photo-rm { position: absolute; top: 4px; right: 4px; background: rgba(220,38,38,0.88); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }

    .action-bar { padding: 22px 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { padding: 13px 28px; border: none; border-radius: 9px; font-size: 14px; font-weight: 700; cursor: pointer; background: var(--grad); color: white; font-family: inherit; letter-spacing: 0.3px; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { padding: 13px 28px; border: none; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; background: #f0f0f5; color: #444; font-family: inherit; transition: background 0.15s; }
    .btn-secondary:hover { background: #e4e4ee; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: white; border-radius: 18px; padding: 28px; width: 100%; max-width: 460px; box-shadow: 0 24px 60px rgba(0,0,0,0.35); }
    .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 18px; }
    .modal-fields { display: flex; flex-direction: column; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

    .name-edit-row { display: flex; gap: 6px; margin-bottom: 4px; }
    .name-edit-row input { flex: 1; padding: 6px 10px; font-size: 13px; }
    .btn-save-name { padding: 6px 12px; background: var(--grad); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
    .rename-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 0; opacity: 0.45; flex-shrink: 0; }
    .rename-btn:hover { opacity: 1; }

    /* SORT BAR */
    .sort-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .sort-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.75); text-transform: uppercase; letter-spacing: 0.8px; margin-right: 2px; }
    .sort-btn { padding: 7px 14px; border: 2px solid rgba(255,255,255,0.35); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.12); color: white; font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
    .sort-btn:hover { background: rgba(255,255,255,0.22); }
    .sort-btn.active { background: white; color: var(--purple); border-color: white; }
    .sort-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.25); margin: 0 2px; }

    /* DRAG-TO-REORDER */
    .sculpture-card.dragging { opacity: 0.4; transform: scale(0.97); box-shadow: none; }
    .sculpture-card.drag-over { outline: 3px dashed white; outline-offset: 2px; }
    .drag-hint { font-size: 11px; color: rgba(255,255,255,0.65); font-style: italic; margin-left: 4px; align-self: center; }

    /* PRINT VIEW */
    #print-view { display: none; font-family: 'DM Sans', sans-serif; padding: 28px; color: #222; background: white; min-height: 100vh; }
    .print-toolbar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 20px; }
    .print-hdr { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; border-bottom: 3px solid var(--purple); padding-bottom: 14px; }
    .print-hdr h1 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; }
    .print-hdr p  { font-size: 12px; color: #777; margin-top: 4px; }
    .print-section-title { font-size: 11px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--purple); padding-bottom: 5px; margin-bottom: 12px; }
    .print-summary { width: 100%; border-collapse: collapse; margin-bottom: 28px; font-size: 12px; }
    .print-summary th { background: var(--purple); color: white; padding: 8px 10px; text-align: left; font-size: 11px; }
    .print-summary td { padding: 8px 10px; border-bottom: 1px solid #eee; }
    .print-summary tr:nth-child(even) td { background: #f9f9ff; }
    .print-detail { margin-bottom: 24px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
    .print-detail-hdr { background: #f5f5ff; padding: 10px 14px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .print-detail-hdr strong { font-size: 14px; }
    .print-detail-hdr .meta { font-size: 11px; color: #666; text-align: right; line-height: 1.6; }
    .print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .print-table th { background: #eee; padding: 6px 10px; text-align: left; font-size: 10px; text-transform: uppercase; }
    .print-table td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
    .print-cat-row td { background: #f0f0ff; font-weight: 700; font-size: 10px; color: var(--purple); text-transform: uppercase; letter-spacing: 0.5px; }
    .print-photos { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 8px; }
    .print-photos img { width: 88px; height: 66px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
    .print-recs { padding: 8px 14px; font-size: 12px; color: #444; border-top: 1px solid #eee; }
    .print-footer { margin-top: 24px; text-align: center; font-size: 10px; color: #aaa; border-top: 1px solid #eee; padding-top: 10px; }

    @media print {
      body > .page { display: none !important; }
      .overlay     { display: none !important; }
      #print-view  { display: block !important; }
      .no-print    { display: none !important; }
      .page-break  { page-break-before: always; }
      table { page-break-inside: auto; }
      tr    { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<!-- ═══════ MAIN APP ═══════ -->
<div class="page" id="app-page">
  <div class="app-header">
    <h1>🎨 MAC Sculptfusion</h1>
    <p>Public Art Inspection &amp; Maintenance</p>
  </div>

  <div class="toolbar" id="home-toolbar">
    <button class="btn-white" onclick="showPrintView()">📄 PDF Report</button>
    <button class="btn-white" onclick="exportJSON()">📤 Export Data</button>
    <label class="btn-white" style="cursor:pointer;">
      📥 Import Data
      <input type="file" accept=".json" style="display:none" onchange="importJSON(this)">
    </label>
    <button class="btn-ghost" id="manage-btn" onclick="toggleManage()">✏️ Manage</button>
  </div>

  <div id="home-screen">
    <div class="sort-bar" id="sort-bar">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" id="sort-custom" onclick="setSort('custom')">⠿ Custom</button>
      <button class="sort-btn" id="sort-title"  onclick="setSort('title')">A–Z Title</button>
      <button class="sort-btn" id="sort-artist" onclick="setSort('artist')">A–Z Artist</button>
      <div class="sort-divider"></div>
      <span class="drag-hint" id="drag-hint">Drag cards to reorder</span>
    </div>
    <div class="card-grid" id="card-grid"></div>
  </div>

  <!-- INSPECTION SCREEN -->
  <div id="inspection-screen" style="display:none;">
    <button class="back-btn" onclick="goHome()">← Back to Collection</button>
    <div class="app-header" style="margin-bottom:18px;">
      <h1 id="insp-title">Sculpture Name</h1>
      <p>MAC Sculptfusion Maintenance Report</p>
    </div>
    <div class="main-card">
      <!-- Sculpture image banner -->
      <div id="insp-img-wrapper"></div>

      <!-- Details -->
      <div class="section">
        <div class="sec-title">Inspection Details</div>
        <div class="grid-3" style="margin-bottom:14px;">
          <div>
            <label class="field-label">Sculpture</label>
            <input type="text" id="f-name" readonly>
          </div>
          <div>
            <label class="field-label">Artist</label>
            <input type="text" id="f-artist" readonly>
          </div>
          <div>
            <label class="field-label">Date</label>
            <input type="date" id="f-date">
          </div>
        </div>
        <div class="grid-2">
          <div>
            <label class="field-label">Location</label>
            <input type="text" id="f-location" placeholder="e.g., City Hall Plaza">
          </div>
          <div>
            <label class="field-label">Inspector</label>
            <input type="text" id="f-inspector" placeholder="Your name">
          </div>
        </div>
      </div>

      <!-- Checklists (injected) -->
      <div id="checklist-sections"></div>

      <!-- Photos -->
      <div class="section">
        <div class="sec-title">Photo Documentation</div>
        <label class="photo-upload-label">
          📷 Tap to upload photos
          <input type="file" multiple accept="image/*" onchange="handlePhotos(this.files)">
        </label>
        <div class="photo-grid" id="photo-grid"></div>
      </div>

      <!-- Overall Assessment -->
      <div class="section">
        <div class="sec-title">Overall Assessment</div>
        <label class="field-label">Maintenance Required</label>
        <div class="maint-row" id="maint-row"></div>
        <label class="field-label">Recommended Actions &amp; Notes</label>
        <textarea id="f-recommendations" placeholder="Describe any maintenance needs..."></textarea>
      </div>

      <div class="action-bar">
        <button class="btn-primary" onclick="saveInspection()">💾 Save Report</button>
        <button class="btn-secondary" onclick="clearForm()">🔄 Clear Form</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════ PRINT VIEW ═══════ -->
<div id="print-view">
  <div class="print-toolbar no-print">
    <button class="btn-primary" onclick="window.print()">🖨️ Print / Save as PDF</button>
    <button class="btn-secondary" onclick="hidePrintView()">← Back</button>
  </div>
  <div id="print-content"></div>
</div>

<!-- ═══════ ADD SCULPTURE MODAL ═══════ -->
<div class="overlay" id="modal" style="display:none;" onclick="closeModalBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">Add New Sculpture</h2>
    <div class="modal-fields">
      <div>
        <label class="field-label">Sculpture Title</label>
        <input type="text" id="new-name" placeholder="Sculpture title..."
          onkeydown="if(event.key==='Enter')submitModal(); if(event.key==='Escape')hideModal();">
      </div>
      <div>
        <label class="field-label">Artist</label>
        <input type="text" id="new-artist" placeholder="Artist name...">
      </div>
      <div>
        <label class="field-label">Location</label>
        <input type="text" id="new-location" placeholder="Location...">
      </div>
      <div>
        <label class="field-label">Last Inspection Date</label>
        <input type="text" id="new-lastinspection" placeholder="e.g. Aug 20, 2025">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideModal()">Cancel</button>
      <button class="btn-primary" onclick="submitModal()">Add Sculpture</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════
//  CHECKLISTS — ordered as requested
// ═══════════════════════════════
const CHECKLISTS = {
  surface: {
    label: "Surface Condition",
    items: [
      { q: "Is rust or corrosion present?",               type: "presence"  },
      { q: "Is the paint or coating intact?",             type: "condition" },
      { q: "Is peeling or discoloration present?",        type: "presence"  },
      { q: "Is the sealant or protective coating sound?", type: "condition" },
      { q: "Is water staining present?",                  type: "presence"  },
    ]
  },
  cleanliness: {
    label: "Cleanliness & Biological Growth",
    items: [
      { q: "Is moss or mold present?",             type: "presence"  },
      { q: "Is there bird dropping accumulation?", type: "presence"  },
      { q: "Is algae or lichen growth present?",   type: "presence"  },
      { q: "Is the surface acceptably clean?",     type: "condition" },
    ]
  },
  vandalism: {
    label: "Vandalism & Damage",
    items: [
      { q: "Is graffiti present?",                type: "presence" },
      { q: "Are dents or impact damage visible?", type: "presence" },
      { q: "Are any pieces missing or broken?",   type: "presence" },
      { q: "Are scratches or gouges present?",    type: "presence" },
    ]
  },
  structural: {
    label: "Structural Integrity",
    items: [
      { q: "Are the main bolts and fasteners secure?",   type: "condition" },
      { q: "Are welds and joints intact?",               type: "condition" },
      { q: "Is the foundation and base stable?",         type: "condition" },
      { q: "Are there cracks visible in the structure?", type: "presence"  },
      { q: "Do moving parts operate smoothly?",          type: "condition" },
    ]
  },
  concrete: {
    label: "Concrete & Foundation",
    items: [
      { q: "Is the concrete surface intact?",      type: "condition" },
      { q: "Are there chips or breaks present?",   type: "presence"  },

function emptyChecklist(){
  const cl={};
  for(const [cat,{items}] of Object.entries(CHECKLISTS))
    cl[cat]=items.map(()=>({rating:"",notes:""}));
  return cl;
}
function todayStr(){ return new Date().toISOString().split("T")[0]; }
function escHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function renderBadge(maint){
  const k=STATUS_MAP[maint]||"";
  return `<span class="badge ${BADGE_CLASS[k]||"badge-empty"}">${maint||"No report yet"}</span>`;
}

// ═══════════════════════════════
//  RENDER CARDS
// ═══════════════════════════════
function renderCards(){
  const grid=document.getElementById("card-grid");
  grid.innerHTML="";

  getSortedSculptures().forEach(s=>{
    const r=inspections[s.id];
    const maint=r?.maintenance||"";
    const card=document.createElement("div");
    card.className="sculpture-card"+(manageMode?" manage-mode":"");
    card.dataset.id=s.id;
    if(!manageMode) card.addEventListener("click",()=>openInspection(s.id));

    if(manageMode){
      const del=document.createElement("button");
      del.className="del-btn"; del.textContent="×";
      del.addEventListener("click",e=>{e.stopPropagation();deleteSculpture(s.id);});
      card.appendChild(del);
    }

    // Image
    if(s.image){
      const img=document.createElement("img");
      img.src=s.image; img.alt=s.name; img.className="card-img";
      card.appendChild(img);
    } else {
      const ph=document.createElement("label");
      ph.className="card-img-placeholder";
      ph.innerHTML=`<span class="ph-icon">📷</span><p>Tap to add photo</p>`;
      const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
      inp.addEventListener("change",e=>{e.stopPropagation();if(e.target.files[0])handleSculptureImage(s.id,e.target.files[0]);});
      ph.appendChild(inp);
      ph.addEventListener("click",e=>e.stopPropagation());
      card.appendChild(ph);
    }

    const body=document.createElement("div");
    body.className="card-body";

    if(editingNameId===s.id){
      body.innerHTML=`
        <div class="name-edit-row" onclick="event.stopPropagation()">
          <input type="text" id="rename-input-${s.id}" value="${escHtml(s.name)}"
            onkeydown="handleRenameKey(event,'${s.id}')">
          <button class="btn-save-name" onclick="commitRename('${s.id}')">Save</button>
        </div>`;
    } else {
      body.innerHTML=`
        <div class="card-name">
          <span>${escHtml(s.name)}</span>
          <button class="rename-btn" title="Rename"
            onclick="event.stopPropagation();startRename('${s.id}')">✏️</button>
        </div>`;
    }

    body.innerHTML+=`
      <div class="card-artist">${escHtml(s.artist||"")}</div>
      <div class="card-loc">📍 ${escHtml(s.location||"—")}</div>
      <div class="card-date">Last inspection: <strong>${s.lastInspection||"Never"}</strong></div>
      ${renderBadge(maint)}`;
    card.appendChild(body);
    initDrag(card, s.id);
    grid.appendChild(card);

    if(editingNameId===s.id)
      setTimeout(()=>{const el=document.getElementById(`rename-input-${s.id}`);if(el)el.focus();},0);
  });

  const addCard=document.createElement("div");
  addCard.className="add-card";
  addCard.innerHTML=`<div class="plus">＋</div><p>Add Sculpture</p>`;
  addCard.addEventListener("click",showModal);
  grid.appendChild(addCard);
}

function renderInspectionImage(id){

  if(s.image){

  }

// ═══════════════════════════════
//  CHECKLIST RENDERING
// ═══════════════════════════════
function renderChecklistSections(){
  const container=document.getElementById("checklist-sections");
  container.innerHTML="";

  for(const [cat,{label,items}] of Object.entries(CHECKLISTS)){
    const sec=document.createElement("div");
    sec.className="section";
    sec.innerHTML=`<div class="sec-title">${label}</div>`;
    items.forEach((item,i)=>{
      const opts=optsFor(item.type);
      const div=document.createElement("div");
      div.className="check-item";
      const btns=opts.map(o=>{
        const urg=o==="Needs Immediate Attention";
        return `<button class="r-btn${urg?" urgent":""}" data-cat="${cat}" data-i="${i}" data-val="${o}"
          onclick="setRating('${cat}',${i},'${o}')">${o}</button>`;
      }).join("");
      div.innerHTML=`
        <div class="check-q">${item.q}</div>
        <div class="rating-row">${btns}</div>
        <input type="text" placeholder="Add notes..." data-cat="${cat}" data-i="${i}"
          oninput="setNotes('${cat}',${i},this.value)">`;
      sec.appendChild(div);
    });
    container.appendChild(sec);
  }

  const mr=document.getElementById("maint-row"); mr.innerHTML="";
  ["None","Routine Cleaning","Minor Repair","Major Repair","Urgent"].forEach(v=>{
    const btn=document.createElement("button");
    btn.className="maint-btn"; btn.textContent=v==="Urgent"?"🚨 Urgent":v;
    btn.dataset.val=v;
    btn.addEventListener("click",()=>setMaintenance(v));
    mr.appendChild(btn);
  });
}

function refreshRatingButtons(){
  document.querySelectorAll(".r-btn").forEach(btn=>{
    const cur=currentChecklist[btn.dataset.cat]?.[parseInt(btn.dataset.i)]?.rating||"";
    btn.classList.toggle("selected",cur===btn.dataset.val);
  });
}
function refreshMaintButtons(){
  const m=document.getElementById("f-recommendations").dataset.maint||"";
  document.querySelectorAll(".maint-btn").forEach(btn=>btn.classList.toggle("selected",btn.dataset.val===m));
}
function fillNotesFields(){
  document.querySelectorAll("input[data-cat][data-i]").forEach(inp=>{
    inp.value=currentChecklist[inp.dataset.cat]?.[parseInt(inp.dataset.i)]?.notes||"";
  });
}
function renderPhotos(){
  const grid=document.getElementById("photo-grid"); grid.innerHTML="";
  currentPhotos.forEach((src,i)=>{
    const item=document.createElement("div"); item.className="photo-item";
    item.innerHTML=`<img src="${src}" alt=""><button class="photo-rm" onclick="removePhoto(${i})">×</button>`;
    grid.appendChild(item);
  });

// ═══════════════════════════════
//  NAVIGATION
// ═══════════════════════════════
function openInspection(id){
  currentId=id;
  const s=sculptures.find(x=>x.id===id);
  const r=inspections[id];

  currentChecklist=emptyChecklist();
  if(r?.checklist){
    for(const [cat,{items}] of Object.entries(CHECKLISTS)){
      items.forEach((_,i)=>{
        currentChecklist[cat][i].rating=r.checklist[cat]?.[i]?.rating||"";
        currentChecklist[cat][i].notes =r.checklist[cat]?.[i]?.notes ||"";
      });
    }
  }
  currentPhotos=r?.photos?[...r.photos]:[];

  document.getElementById("insp-title").textContent          =s.name;
  document.getElementById("f-name").value                    =s.name;
  document.getElementById("f-artist").value                  =s.artist||"";
  document.getElementById("f-date").value                    =r?.inspectionDate||todayStr();
  document.getElementById("f-location").value                =r?.location||s.location||"";
  document.getElementById("f-inspector").value               =r?.inspectorName||"";
  document.getElementById("f-recommendations").value         =r?.recommendations||"";
  document.getElementById("f-recommendations").dataset.maint =r?.maintenance||"";

  renderInspectionImage(id);
  renderChecklistSections();
  refreshRatingButtons();
  refreshMaintButtons();
  fillNotesFields();
  renderPhotos();

  document.getElementById("home-screen").style.display       ="none";
  document.getElementById("home-toolbar").style.display      ="none";
  document.getElementById("inspection-screen").style.display ="block";
  window.scrollTo(0,0);
}

function goHome(){
  currentId=null;
  document.getElementById("inspection-screen").style.display ="none";
  document.getElementById("home-screen").style.display       ="block";
  document.getElementById("home-toolbar").style.display      ="flex";
  renderCards();
}

// ═══════════════════════════════
//  FORM HANDLERS
// ═══════════════════════════════
function setRating(cat,i,val){
  currentChecklist[cat][i].rating=currentChecklist[cat][i].rating===val?"":val;
  refreshRatingButtons();
}
function setNotes(cat,i,val){ currentChecklist[cat][i].notes=val; }
function setMaintenance(val){
  const el=document.getElementById("f-recommendations");
  el.dataset.maint=el.dataset.maint===val?"":val;
  refreshMaintButtons();
}
function handlePhotos(files){
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{currentPhotos.push(e.target.result);renderPhotos();};
    reader.readAsDataURL(file);
  });
}
function removePhoto(i){ currentPhotos.splice(i,1); renderPhotos(); }

function saveInspection(){
  const data={
    inspectionDate: document.getElementById("f-date").value,
    location:       document.getElementById("f-location").value,
    inspectorName:  document.getElementById("f-inspector").value,
    maintenance:    document.getElementById("f-recommendations").dataset.maint||"",
    recommendations:document.getElementById("f-recommendations").value,
    checklist:      JSON.parse(JSON.stringify(currentChecklist)),
    photos:         [...currentPhotos]
  };
  inspections[currentId]=data;
  const dateStr=data.inspectionDate
    ?new Date(data.inspectionDate+"T12:00:00").toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"})
    :null;
  sculptures=sculptures.map(s=>s.id===currentId?{...s,lastInspection:dateStr,location:data.location}:s);
  alert("✅ Report saved!");
}

function clearForm(){
  if(!confirm("Clear form? Saved data not affected.")) return;
  currentChecklist=emptyChecklist();
  currentPhotos=[];
  const s=sculptures.find(x=>x.id===currentId);
  document.getElementById("f-date").value            =todayStr();
  document.getElementById("f-location").value        =s?.location||"";
  document.getElementById("f-inspector").value       ="";
  document.getElementById("f-recommendations").value ="";
  document.getElementById("f-recommendations").dataset.maint="";
  refreshRatingButtons(); refreshMaintButtons(); fillNotesFields(); renderPhotos();
}

function toggleManage(){

  const btn=document.getElementById("manage-btn");
  btn.textContent=manageMode?"✅ Done":"✏️ Manage";
  btn.classList.toggle("active",manageMode);

function deleteSculpture(id){
  if(!confirm("Delete this sculpture?")) return;
  sculptures=sculptures.filter(s=>s.id!==id);
  delete inspections[id];
  renderCards();
}
function handleSculptureImage(id,file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    sculptures=sculptures.map(s=>s.id===id?{...s,image:e.target.result}:s);
    renderCards();
    if(cb) cb();
  };
  reader.readAsDataURL(file);
}
function startRename(id){ editingNameId=id; renderCards(); }
function handleRenameKey(e,id){
  if(e.key==="Enter") commitRename(id);
  if(e.key==="Escape"){ editingNameId=null; renderCards(); }
}
function commitRename(id){
  const v=document.getElementById(`rename-input-${id}`)?.value?.trim();
  if(v) sculptures=sculptures.map(s=>s.id===id?{...s,name:v}:s);
  editingNameId=null; renderCards();
}

function exportJSON(){
  const data={exportDate:new Date().toISOString(),appVersion:"1.0",sculptures,inspections,customOrder:getCustomOrder(),sortMode};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`MAC_Sculptfusion_${new Date().toISOString().split("T")[0]}.json`;
  a.click(); URL.revokeObjectURL(url);
}

// ═══════════════════════════════
//  IMPORT JSON
// ═══════════════════════════════
function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.sculptures||!Array.isArray(data.sculptures)){
        alert("❌ Invalid file. Please use a MAC Sculptfusion export (.json).");
        return;
      }
      const replace=confirm(
        `Found ${data.sculptures.length} sculptures in the file.\n\n`+
        `OK = Replace all current data\nCancel = Merge (add new sculptures only)`
      );
      if(replace){
        sculptures=data.sculptures;
        inspections=data.inspections||{};
        if(data.customOrder){ customOrder=data.customOrder; }
        if(data.sortMode){ sortMode=data.sortMode; }
        // sync sort buttons
        document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
        const sb=document.getElementById('sort-'+sortMode);
        if(sb) sb.classList.add('active');
        const hint=document.getElementById('drag-hint');
        if(hint) hint.style.opacity=sortMode==='custom'?'1':'0.3';
      } else {
        // Merge by name+artist key
        const existing=new Set(sculptures.map(s=>`${s.name}||${s.artist||""}`));
        const idMap={};
        data.sculptures.forEach(s=>{
          const key=`${s.name}||${s.artist||""}`;
          if(!existing.has(key)){
            const newId=genId();
            idMap[s.id]=newId;
            sculptures.push({...s,id:newId});
          } else {
            // find matching local id for inspection merge
            const local=sculptures.find(x=>`${x.name}||${x.artist||""}`===key);
            if(local) idMap[s.id]=local.id;
          }
        });
        if(data.inspections){
          Object.entries(data.inspections).forEach(([oldId,insp])=>{
            const newId=idMap[oldId];
            if(newId&&!inspections[newId]) inspections[newId]=insp;
          });
        }
      }
      renderCards();
      alert(`✅ Import complete — ${sculptures.length} sculptures loaded.`);
    } catch(err){
      alert("❌ Could not read file. Make sure it's a valid MAC Sculptfusion JSON export.");
    }
  };
  reader.readAsText(file);
  input.value="";
}

// ═══════════════════════════════
function printBadge(maint){
  const C={none:{bg:"#e8f5e9",fg:"#16a34a"},routine:{bg:"#eff6ff",fg:"#1d4ed8"},minor:{bg:"#fffbeb",fg:"#d97706"},major:{bg:"#fef2f2",fg:"#dc2626"},urgent:{bg:"#dc2626",fg:"white"},"0":{bg:"#f3f4f6",fg:"#6b7280"}};
  const c=C[STATUS_MAP[maint]||"0"]||C["0"];
  return `<span style="background:${c.bg};color:${c.fg};padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;">${maint||"Not assessed"}</span>`;
}
function ratingColor(rating,type){
  if(!rating) return "#bbb";
  if(type==="yesno") return rating==="Yes"?"#16a34a":"#999";
  if(rating==="Needs Immediate Attention"||rating==="Poor"||rating==="Substantial") return "#dc2626";
  if(rating==="Fair"||rating==="Minimal") return "#d97706";
  return "#16a34a";
}

function buildPrintHTML(){
  const now=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  let html=`
    <div class="print-hdr">
      <div><h1>🎨 MAC Sculptfusion — Maintenance Report</h1>
      <p>Generated: ${now} &nbsp;|&nbsp; ${sculptures.length} sculptures</p></div>
    </div>
    <div class="print-section-title">Summary Overview</div>
    <table class="print-summary"><thead><tr>
      <th>Sculpture</th><th>Artist</th><th>Date</th><th>Location</th><th>Inspector</th><th>Status</th><th>Notes</th>
    </tr></thead><tbody>`;

  sculptures.forEach(s=>{
    const r=inspections[s.id];
    const date=r?.inspectionDate?new Date(r.inspectionDate+"T12:00:00").toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}):"—";
    const rec=(r?.recommendations||"—").slice(0,65)+((r?.recommendations||"").length>65?"…":"");
    html+=`<tr>
      <td><strong>${escHtml(s.name)}</strong></td>
      <td style="font-style:italic">${escHtml(s.artist||"—")}</td>
      <td>${date}</td>
      <td>${escHtml(r?.location||s.location||"—")}</td>
      <td>${escHtml(r?.inspectorName||"—")}</td>
      <td>${printBadge(r?.maintenance||"")}</td>
      <td style="font-size:11px">${escHtml(rec)}</td>
    </tr>`;
  });
  html+=`</tbody></table><div class="print-section-title">Detailed Inspection Reports</div>`;

  sculptures.forEach((s,idx)=>{
    const r=inspections[s.id];
    html+=`<div class="print-detail${idx>0?" page-break":""}">
      <div class="print-detail-hdr"><strong>${escHtml(s.name)}</strong>`;
    if(r){
      const date=r.inspectionDate?new Date(r.inspectionDate+"T12:00:00").toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}):"—";
      html+=`<div class="meta">${escHtml(s.artist||"")} &nbsp;|&nbsp; ${date}<br>${escHtml(r.location||s.location||"—")}<br>Inspector: ${escHtml(r.inspectorName||"—")} &nbsp;|&nbsp; ${printBadge(r.maintenance||"")}</div>`;
    } else {
      html+=`<em style="font-size:12px;color:#999">No inspection on file</em>`;
    }
    html+=`</div>`;

    if(s.image)
      html+=`<img src="${s.image}" alt="${escHtml(s.name)}" style="width:100%;max-height:180px;object-fit:cover;display:block;">`;

    if(r){
      html+=`<table class="print-table"><thead><tr><th>Question</th><th style="width:130px">Response</th><th>Notes</th></tr></thead><tbody>`;
      for(const [cat,{label,items}] of Object.entries(CHECKLISTS)){
        html+=`<tr class="print-cat-row"><td colspan="3">${label}</td></tr>`;
        items.forEach((item,i)=>{
          const sv=r.checklist?.[cat]?.[i]||{};
          html+=`<tr>
            <td>${escHtml(item.q)}</td>
            <td style="font-weight:700;color:${ratingColor(sv.rating,item.type)}">${escHtml(sv.rating||"—")}</td>
            <td style="font-size:11px;color:#555">${escHtml(sv.notes||"")}</td>
          </tr>`;
        });
      }
      html+=`</tbody></table>`;
      if(r.recommendations)
        html+=`<div class="print-recs"><strong>Actions / Notes:</strong> ${escHtml(r.recommendations)}</div>`;
      if(r.photos?.length){
        html+=`<div class="print-photos">`;
        r.photos.forEach(p=>{html+=`<img src="${p}" alt="">`;});
        html+=`</div>`;
      }
    }
    html+=`</div>`;
  });

  html+=`<div class="print-footer">MAC Sculptfusion Public Art Inspection System | ${now}</div>`;
  return html;
}

function showPrintView(){
  document.getElementById("print-content").innerHTML=buildPrintHTML();
  document.getElementById("app-page").style.display="none";
  document.getElementById("print-view").style.display="block";
  window.scrollTo(0,0);
}
function hidePrintView(){
  document.getElementById("print-view").style.display="none";
  document.getElementById("app-page").style.display="block";
}


// ═══════════════════════════════
//  SORT & DRAG-TO-REORDER
// ═══════════════════════════════
let sortMode = 'custom';   // 'custom' | 'title' | 'artist'
let customOrder = null;    // array of ids in user-defined order
let dragSrcId  = null;

function getCustomOrder() {
  if (!customOrder) customOrder = sculptures.map(s => s.id);
  // ensure any newly added sculptures appear at end
  sculptures.forEach(s => { if (!customOrder.includes(s.id)) customOrder.push(s.id); });
  // remove ids no longer in sculptures
  customOrder = customOrder.filter(id => sculptures.find(s => s.id === id));
  return customOrder;
}

function getSortedSculptures() {
  if (sortMode === 'title')  return [...sculptures].sort((a,b) => a.name.localeCompare(b.name));
  if (sortMode === 'artist') return [...sculptures].sort((a,b) => (a.artist||'').localeCompare(b.artist||'') || a.name.localeCompare(b.name));
  // custom
  const order = getCustomOrder();
  return [...sculptures].sort((a,b) => order.indexOf(a.id) - order.indexOf(b.id));
}

function setSort(mode) {
  sortMode = mode;
  // If switching TO custom, seed the order from whatever is current sorted display
  if (mode === 'custom' && !customOrder) {
    customOrder = sculptures.map(s => s.id);
  }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  // drag hint only visible in custom mode
  const hint = document.getElementById('drag-hint');
  if (hint) hint.style.opacity = mode === 'custom' ? '1' : '0.3';
  renderCards();
}

function initDrag(card, id) {
  card.draggable = (sortMode === 'custom');
  if (sortMode !== 'custom') return;

  card.addEventListener('dragstart', e => {
    dragSrcId = id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.sculpture-card').forEach(c => c.classList.remove('drag-over'));
  });
  card.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (id !== dragSrcId) card.classList.add('drag-over');
  });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    if (!dragSrcId || dragSrcId === id) return;
    const order = getCustomOrder();
    const fromIdx = order.indexOf(dragSrcId);
    const toIdx   = order.indexOf(id);
    if (fromIdx === -1 || toIdx === -1) return;
    order.splice(fromIdx, 1);
    order.splice(toIdx, 0, dragSrcId);
    customOrder = order;
    renderCards();
  });
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
renderCards();
</script>
